services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cursor-ai-chat-api:latest
    container_name: cursor-ai-chat-api
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      CURSOR_WORKSPACE: /app
    ports:
      - "${PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
